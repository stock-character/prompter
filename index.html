<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fail-Safe Teleprompter</title>
    <style>
        body { margin: 0; background: #111; color: white; font-family: sans-serif; }
        
        /* The Header Bar */
        #header {
            position: fixed; top: 0; left: 0; width: 100%; height: 80px;
            background: #222; display: flex; align-items: center; 
            justify-content: center; gap: 20px; z-index: 9999;
            border-bottom: 2px solid #444;
        }

        /* The Content Area */
        #container { margin-top: 100px; padding: 0 10% 80vh 10%; }
        
        #display { font-size: 60px; line-height: 1.5; white-space: pre-wrap; }
        
        #editor { 
            display: none; width: 100%; height: 400px; 
            background: #000; color: #0f0; font-family: monospace; 
            font-size: 20px; padding: 15px; border: 1px solid #555;
        }

        /* UI Elements */
        button { 
            padding: 10px 15px; cursor: pointer; font-weight: bold; 
            border: none; border-radius: 4px; background: #444; color: white;
        }
        button:active { background: #666; }
        #btnStart { background: #28a745; }
        #btnStop { background: #dc3545; }
        
        .control-group { display: flex; flex-direction: column; align-items: center; font-size: 12px; }
    </style>
</head>
<body>

    <div id="header">
        <button id="btnEdit">EDIT TEXT</button>
        <button id="btnStart">START</button>
        <button id="btnStop">STOP</button>
        <button id="btnReset">RESET</button>
        
        <div class="control-group">
            SPEED
            <input type="range" id="speedRange" min="1" max="20" value="2">
        </div>
        
        <div class="control-group">
            FONT SIZE
            <input type="range" id="sizeRange" min="20" max="150" value="60">
        </div>
    </div>

    <div id="container">
        <textarea id="editor">Paste your script here...</textarea>
        <div id="display">PASTE YOUR SCRIPT HERE...
            
1. Click 'EDIT TEXT'
2. Paste your script
3. Click 'SAVE'
4. Click 'START'</div>
    </div>

    <script>
        // Use document.getElementById to ensure we grab the elements correctly
        const btnEdit = document.getElementById('btnEdit');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        const btnReset = document.getElementById('btnReset');
        const speedRange = document.getElementById('speedRange');
        const sizeRange = document.getElementById('sizeRange');
        const display = document.getElementById('display');
        const editor = document.getElementById('editor');

        let scrollInterval = null;
        let isEditing = false;

        // 1. Toggle Edit/Read Mode
        btnEdit.addEventListener('click', () => {
            if (!isEditing) {
                stopScrolling();
                editor.value = display.innerText;
                display.style.display = 'none';
                editor.style.display = 'block';
                btnEdit.innerText = "SAVE & EXIT";
                isEditing = true;
            } else {
                display.innerText = editor.value;
                display.style.display = 'block';
                editor.style.display = 'none';
                btnEdit.innerText = "EDIT TEXT";
                isEditing = false;
            }
        });

        // 2. Start Scrolling
        function startScrolling() {
            if (scrollInterval || isEditing) return;
            scrollInterval = setInterval(() => {
                window.scrollBy(0, parseInt(speedRange.value));
            }, 30);
        }
        btnStart.addEventListener('click', startScrolling);

        // 3. Stop Scrolling
        function stopScrolling() {
            clearInterval(scrollInterval);
            scrollInterval = null;
        }
        btnStop.addEventListener('click', stopScrolling);

        // 4. Reset
        btnReset.addEventListener('click', () => {
            stopScrolling();
            window.scrollTo(0, 0);
        });

        // 5. Font Size Change
        sizeRange.addEventListener('input', () => {
            display.style.fontSize = sizeRange.value + "px";
        });

        // 6. Spacebar Support
        window.addEventListener('keydown', (e) => {
            if (e.code === "Space" && !isEditing) {
                e.preventDefault();
                if (scrollInterval) stopScrolling();
                else startScrolling();
            }
        });
    </script>
</body>
</html>
